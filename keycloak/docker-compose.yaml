services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    # 'start-dev' automatically disables theme and template caching
    command: start-dev
    volumes:
      # Mount local directory into the container
      - ./custom-theme:/opt/keycloak/themes/custom-theme