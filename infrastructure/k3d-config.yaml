apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: local-k3s
servers: 1
agents: 1

ports:
  - port: 80:80
    nodeFilters: [ loadbalancer ]
  - port: 443:443
    nodeFilters: [ loadbalancer ]
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters: [ "server:*" ]
registries:
  create:
    name: registry.localhost
    host: "0.0.0.0"
    hostPort: "5000"
  config: |
    mirrors:
      "registry.local":
        endpoint:
          - "http://k3d-registry.localhost:5000"
