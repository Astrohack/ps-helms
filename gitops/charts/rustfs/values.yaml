accessKey: "rustfsadmin"
secretKey: "rustfsadminpassword"

rustfs:
  replicaCount: 1

  mode:
    standalone:
      enabled: true
    distributed:
      enabled: false

  secret:
    existingSecret: "rustfs-credentials"
    allowInsecureDefaults: false

  storageclass:
    name: local-path
    dataStorageSize: 1Gi
    logStorageSize: 1Gi

  ingress:
    enabled: false
