domains:
  kiali: "default.local"

kiali-server:
  auth:
    strategy: anonymous
  server:
    port: 20001
    web_root: /
  external_services:
    tracing:
      enabled: true
      in_cluster_url: 'http://jaeger-query.jaeger.svc.cluster.local:16685'
      url: 'https://jaeger.dev.localhost'
      use_grpc: true
    prometheus:
      enabled: true
      url: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
    grafana:
      enabled: true
      in_cluster_url: 'http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80'
      url: "https://grafana.dev.localhost"
  ingress:
    enabled: false
