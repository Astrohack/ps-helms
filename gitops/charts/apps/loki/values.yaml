loki:
  singleBinary:
    replicas: 1

  lokiCanary:
    enabled: false

  test:
    enabled: false

  deploymentMode: SingleBinary

  read:
    replicas: 0
  backend:
    replicas: 0
  write:
    replicas: 0
  gateway:
    replicas: 0

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

  storage:
    type: filesystem
    filesystem:
      storageClassName: "standard"
      size: 5Gi

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
