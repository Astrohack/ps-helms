# values.yaml

livekit:
  # Provide your secure API keys
  keys:
    my_api_key: "your_secure_secret_key"

  # Built-in TURN server configuration
  turn:
    enabled: true
    # Domain must match your TLS certificate
    domain: turn.example.com
    # TURN/TLS port over TCP. Use 443 if your LoadBalancer restricts custom TCP ports.
    tls_port: 3478
    # TURN/UDP port. Must be exposed on your firewall.
    udp_port: 3478
    # Set to true if TLS termination is handled by an external LoadBalancer or Ingress.
    # external_tls: false

  # WebRTC networking configuration
  rtc:
    # Required for the server to announce its public IP to clients
    use_external_ip: true
    tcp_port: 7881
    # UDP port range for media routing. Must be exposed on the firewall.
    port_range_start: 50000
    port_range_end: 60000

# Enterprise best practice: Use LoadBalancer for reliable WebRTC/TURN traffic routing
serviceType: "LoadBalancer"

# Configure Redis for distributed setups (Required for scaling > 1 pod)
redis:
  deploy: true
  # To use a managed external Redis (e.g., ElastiCache, MemoryDB), set deploy to false and use:
  # url: redis://your-managed-redis-endpoint:6379
