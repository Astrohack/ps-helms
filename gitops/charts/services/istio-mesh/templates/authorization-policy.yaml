apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: mesh-auth-policy
  namespace: {{ .Release.Namespace | default "apps" }}
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            requestPrincipals: ["*"]

    - from:
        - source:
            namespaces: ["{{ .Release.Namespace | default "apps" }}"]

    - to:
        - operation:
            hosts:
              - "frontend"
              - "frontend.{{ .Release.Namespace | default "apps" }}.svc.cluster.local"
              - "app.dev.localhost"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: iam-public-routes
  namespace: {{ .Release.Namespace | default "apps" }}
spec:
  selector:
    matchLabels:
      app: iam
  action: ALLOW
  rules:
    - to:
        - operation:
            paths:
              - "/api/v1/auth/login"
              - "/api/v1/auth/register"
              - "/api/v1/auth/params"
              - "/api/v1/auth/verify-email"
              - "/api/v1/auth/refresh"
              - "/api/v1/auth/logout"
              - "/api/v1/auth/recovery/init"
              - "/api/v1/auth/recovery/complete"
              - "/api/v1/auth/confirm-email-change"
              - "/api/v1/auth/cancel-email-change"
              - "/api/v1/auth/jwks"
              - "/api/v1/auth/.well-known/jwks.json"
