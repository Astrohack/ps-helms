domains:
  audit: "audit.dev.localhost"

replicaCount: 1

image:
  repository: local-registry:5000/audit
  tag: "1.0.0"
  pullPolicy: Always

service:
  enabled: true
  type: ClusterIP
  port: 3000

env: []

config:
  appName: "ps-audit"
  profile: "default"
  port: 3000

  configServerUrl: "http://config-server.apps.svc.cluster.local:80"
  configServerUsername: "service"

  dbHost: postgres-rw.database.svc.cluster.local
  dbPort: 5432
  dbName: advisor
  dbSslMode: "disable"
  dbConnectTimeout: 5

  otlpEndpoint: "jaeger-collector.jaeger.svc.cluster.local"

  llmProvider: "openai"

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
