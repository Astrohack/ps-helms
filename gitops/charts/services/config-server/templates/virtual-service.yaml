apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ .Chart.Name }}-vs
spec:
  hosts:
    - "{{ .Values.domains.configServer }}"
  gateways:
    - istio-system/ops-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: config-server.{{ .Release.Namespace }}.svc.cluster.local
            port:
              number: {{ .Values.service.port }}
