domains:
  frontend: "app.dev.localhost"

replicaCount: 1

image:
  repository: local-registry:5000/frontend
  tag: "1.0.0"
  pullPolicy: Always

service:
  enabled: true
  type: ClusterIP
  port: 80

env: []

config:
  appName: "ps-frontend"
  profile: "default"
  port: 80

  configServerUrl: "http://config-server.apps.svc.cluster.local:80"
  configServerUsername: "service"

  dbHost: postgres-rw.database.svc.cluster.local
  dbPort: 5432
  dbName: iam
  dbSslMode: "disable"
  dbConnectTimeout: 5

  otlpEndpoint: "jaeger-collector.jaeger.svc.cluster.local"
